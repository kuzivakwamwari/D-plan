<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0e0e0e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./style.css">
  <title>Contacts — PWA App</title>
</head>
<body>

<button class="nav-toggle" id="navToggle">☰</button>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span>// pwa app</span>
      <h2>DataStore</h2>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Main</div>
      <a href="./index.html"    class="nav-item"><span class="icon">⊞</span> Dashboard</a>
      <a href="./contacts.html" class="nav-item active"><span class="icon">◈</span> Contacts</a>
      <a href="./profile.html"  class="nav-item"><span class="icon">◉</span> Users</a>
    </nav>
    <div class="sidebar-footer">
      <span class="online-dot"></span>
      <span id="sw-status">SW loading...</span>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">

    <div class="page-header fade-in">
      <p class="page-tag">// contacts</p>
      <h1>Contacts</h1>
      <p>Stored in IndexedDB locally on your device. Works fully offline.</p>
    </div>

    <!-- Add / Edit Form -->
    <div class="card fade-in d1">
      <div class="card-title" id="form-title">// add new contact</div>
      <input type="hidden" id="edit-id">

      <div class="form-row">
        <div class="form-group">
          <label for="c-name">Full Name *</label>
          <input type="text" id="c-name" placeholder="e.g. Jane Doe">
        </div>
        <div class="form-group">
          <label for="c-phone">Phone</label>
          <input type="tel" id="c-phone" placeholder="+263 77 123 4567">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="c-email">Email</label>
          <input type="email" id="c-email" placeholder="jane@example.com">
        </div>
        <div class="form-group">
          <label for="c-category">Category</label>
          <select id="c-category">
            <option value="general">General</option>
            <option value="work">Work</option>
            <option value="family">Family</option>
            <option value="friend">Friend</option>
            <option value="client">Client</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label for="c-notes">Notes</label>
        <textarea id="c-notes" placeholder="Any extra notes..."></textarea>
      </div>

      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="saveContact()">
          <span id="save-label">+ Save Contact</span>
        </button>
        <button class="btn btn-ghost" onclick="clearForm()" id="cancel-btn" style="display:none">✕ Cancel</button>
      </div>
    </div>

    <!-- Search + count -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:10px;" class="fade-in d2">
      <div class="form-group" style="margin:0;flex:1;min-width:200px;">
        <input type="text" id="search-input" placeholder="Search contacts..." oninput="filterContacts()">
      </div>
      <span style="font-family:var(--mono);font-size:.72rem;color:var(--muted);white-space:nowrap;" id="count-label"></span>
    </div>

    <!-- Contacts table -->
    <div class="card fade-in d2" style="padding:0;overflow:hidden;">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Phone</th>
              <th>Email</th>
              <th>Category</th>
              <th>Notes</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="contacts-tbody"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- Delete confirm modal -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>Delete Contact</h3>
      <button class="modal-close" onclick="closeDeleteModal()">✕</button>
    </div>
    <p style="color:var(--muted);font-size:.9rem;margin-bottom:20px;">
      Are you sure you want to delete <strong id="delete-name"></strong>? This cannot be undone.
    </p>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
      <button class="btn btn-ghost"  onclick="closeDeleteModal()">Cancel</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="./db.js"></script>
<script>
  // ── Nav toggle ────────────────────────────────────────────────
  const sidebar   = document.getElementById('sidebar');
  const navToggle = document.getElementById('navToggle');
  navToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
  document.addEventListener('click', e => {
    if (!sidebar.contains(e.target) && !navToggle.contains(e.target))
      sidebar.classList.remove('open');
  });

  // ── Toast ─────────────────────────────────────────────────────
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = isError ? 'error' : '';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── State ─────────────────────────────────────────────────────
  let allContacts  = [];
  let deleteTarget = null;

  // ── Load & render contacts ────────────────────────────────────
  async function loadContacts() {
    allContacts = await db.contacts.getAll();
    renderContacts(allContacts);
  }

  function renderContacts(list) {
    const tbody = document.getElementById('contacts-tbody');
    document.getElementById('count-label').textContent =
      `${list.length} contact${list.length !== 1 ? 's' : ''}`;

    if (!list.length) {
      tbody.innerHTML = `
        <tr><td colspan="7">
          <div class="empty-state">
            <div class="empty-icon">◈</div>
            <p>No contacts yet. Add one above!</p>
          </div>
        </td></tr>`;
      return;
    }

    tbody.innerHTML = list.map((c, i) => `
      <tr>
        <td style="font-family:var(--mono);font-size:.72rem;color:var(--muted)">${String(i+1).padStart(2,'0')}</td>
        <td><strong>${escHtml(c.name)}</strong></td>
        <td style="font-family:var(--mono);font-size:.78rem">${escHtml(c.phone || '—')}</td>
        <td style="color:var(--muted);font-size:.85rem">${escHtml(c.email || '—')}</td>
        <td><span class="badge badge-amber">${escHtml(c.category || 'general')}</span></td>
        <td style="color:var(--muted);font-size:.82rem;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
          ${escHtml(c.notes || '—')}
        </td>
        <td>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-ghost btn-sm" onclick="editContact(${c.id})">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="openDeleteModal(${c.id}, '${escHtml(c.name)}')">Del</button>
          </div>
        </td>
      </tr>`).join('');
  }

  // ── Search / filter ───────────────────────────────────────────
  function filterContacts() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = allContacts.filter(c =>
      c.name?.toLowerCase().includes(q)   ||
      c.email?.toLowerCase().includes(q)  ||
      c.phone?.toLowerCase().includes(q)  ||
      c.category?.toLowerCase().includes(q)
    );
    renderContacts(filtered);
  }

  // ── Save (create or update) ───────────────────────────────────
  async function saveContact() {
    const name = document.getElementById('c-name').value.trim();
    if (!name) { showToast('Name is required', true); return; }

    const data = {
      name,
      phone:    document.getElementById('c-phone').value.trim(),
      email:    document.getElementById('c-email').value.trim(),
      category: document.getElementById('c-category').value,
      notes:    document.getElementById('c-notes').value.trim(),
    };

    const editId = document.getElementById('edit-id').value;

    try {
      if (editId) {
        await db.contacts.update({ ...data, id: Number(editId) });
        showToast('✓ Contact updated');
      } else {
        await db.contacts.add(data);
        showToast('✓ Contact saved');
      }
      clearForm();
      loadContacts();
    } catch (e) {
      showToast('Error saving contact', true);
      console.error(e);
    }
  }

  // ── Edit ──────────────────────────────────────────────────────
  async function editContact(id) {
    const c = await db.contacts.getById(id);
    if (!c) return;

    document.getElementById('edit-id').value    = c.id;
    document.getElementById('c-name').value     = c.name;
    document.getElementById('c-phone').value    = c.phone || '';
    document.getElementById('c-email').value    = c.email || '';
    document.getElementById('c-category').value = c.category || 'general';
    document.getElementById('c-notes').value    = c.notes || '';

    document.getElementById('form-title').textContent  = '// edit contact';
    document.getElementById('save-label').textContent  = '✓ Update Contact';
    document.getElementById('cancel-btn').style.display = '';

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── Clear form ────────────────────────────────────────────────
  function clearForm() {
    ['c-name','c-phone','c-email','c-notes'].forEach(id =>
      document.getElementById(id).value = '');
    document.getElementById('c-category').value    = 'general';
    document.getElementById('edit-id').value        = '';
    document.getElementById('form-title').textContent = '// add new contact';
    document.getElementById('save-label').textContent = '+ Save Contact';
    document.getElementById('cancel-btn').style.display = 'none';
  }

  // ── Delete modal ──────────────────────────────────────────────
  function openDeleteModal(id, name) {
    deleteTarget = id;
    document.getElementById('delete-name').textContent = name;
    document.getElementById('delete-modal').classList.add('open');
  }
  function closeDeleteModal() {
    deleteTarget = null;
    document.getElementById('delete-modal').classList.remove('open');
  }
  async function confirmDelete() {
    if (!deleteTarget) return;
    await db.contacts.remove(deleteTarget);
    closeDeleteModal();
    showToast('✓ Contact deleted');
    loadContacts();
  }

  // ── Utility: escape HTML ──────────────────────────────────────
  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // ── SW ────────────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      document.getElementById('sw-status').textContent =
        reg.active ? 'SW active' : 'SW installing';
    });
  }

  // ── Init ──────────────────────────────────────────────────────
  loadContacts();
</script>
</body>
</html>
